name: Deploy to GitHub Pages

# 部署整個網站到 GitHub Pages（方式 B）。首次需到 Settings → Pages 將 Source 設為「GitHub Actions」。
# 純靜態網站也可改用更簡單的「方式 A：Deploy from a branch」，完全不需此工作流（見 README）。

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          # 若 Pages 尚未啟用，嘗試以工作流權限自動啟用（省去手動到 Settings 開啟）
          enablement: true
      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
